name: Build LaTeX Manuscript

on:
  push:
    branches: [main]
    paths:
      - "manuscript/**"
      - "tables/**"
      - "scripts/**"
      - ".github/workflows/build-latex.yml"
  pull_request:
    branches: [main]
    paths:
      - "manuscript/**"
      - "tables/**"
      - "scripts/**"
      - ".github/workflows/build-latex.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install LaTeX and zip tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            latexmk \
            texlive-latex-base \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-bibtex-extra \
            biber \
            zip \
            unzip

      - name: Clean manuscript source for double-anonymous review
        run: python3 scripts/jfei_pre_submission_cleanup.py

      - name: Verify manuscript values and blinding
        run: python3 scripts/verify_table_values.py

      - name: Compile manuscript for validation
        working-directory: manuscript
        run: latexmk -pdf -interaction=nonstopmode -halt-on-error NLS-79.tex

      - name: Package and validate root-level LaTeX source
        run: |
          set -euo pipefail

          SOURCE_DIR="output/JFEI-blinded-review-package"
          CHECK_DIR="output/package-compile-check"
          ZIP_PATH="output/JFEI-blinded-review-package.zip"

          rm -rf output
          mkdir -p "$SOURCE_DIR" "$CHECK_DIR"

          awk 'found || /^\\documentclass/ { found=1; print }' manuscript/NLS-79.tex \
            | grep -v '^\\input{glyphtounicode}' \
            | grep -v '^\\pdfgentounicode=1' \
            > "$SOURCE_DIR/main.tex"
          cp manuscript/references.bib "$SOURCE_DIR/references.bib"
          cp "$SOURCE_DIR/main.tex" "$CHECK_DIR/main.tex"
          cp "$SOURCE_DIR/references.bib" "$CHECK_DIR/references.bib"

          test -f "$SOURCE_DIR/main.tex"
          test -f "$SOURCE_DIR/references.bib"
          test "$(head -n 1 "$SOURCE_DIR/main.tex")" = "\\documentclass[12pt]{article}"
          grep -q '\\begin{document}' "$SOURCE_DIR/main.tex"
          if grep -q '^\\input{' "$SOURCE_DIR/main.tex"; then
            echo "Packaged main.tex contains a pre-document input call."
            exit 1
          fi

          (cd "$CHECK_DIR" && latexmk -pdf -interaction=nonstopmode -halt-on-error main.tex)

          file_count=$(find "$SOURCE_DIR" -type f | wc -l)
          test "$file_count" -eq 2

          (cd "$SOURCE_DIR" && zip -r ../JFEI-blinded-review-package.zip main.tex references.bib)

          test -s "$ZIP_PATH"
          zipinfo -1 "$ZIP_PATH"
          zipinfo -1 "$ZIP_PATH" | grep -x "main.tex"
          zipinfo -1 "$ZIP_PATH" | grep -x "references.bib"
          test "$(zipinfo -1 "$ZIP_PATH" | wc -l)" -eq 2
          if zipinfo -1 "$ZIP_PATH" | grep -E '\.pdf$|\.aux$|\.log$|\.out$|/|Funding|funding|Declaration|declaration|Title|title|Cover|cover'; then
            echo "Reviewer ZIP contains a forbidden member."
            exit 1
          fi

      - name: Upload editor source package
        uses: actions/upload-artifact@v4
        with:
          name: JFEI-blinded-review-package
          path: output/JFEI-blinded-review-package.zip
          if-no-files-found: error

# Springer/Snapp intake package contract: root-level main.tex and references.bib only.
