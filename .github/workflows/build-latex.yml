name: Build LaTeX Manuscript

on:
  push:
    branches: [main]
    paths:
      - "manuscript/**"
      - "tables/**"
      - "scripts/**"
      - ".github/workflows/build-latex.yml"
  pull_request:
    branches: [main]
    paths:
      - "manuscript/**"
      - "tables/**"
      - "scripts/**"
      - ".github/workflows/build-latex.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install LaTeX and zip tools
        run: sudo apt-get update && sudo apt-get install -y latexmk texlive-latex-base texlive-latex-recommended texlive-latex-extra texlive-fonts-recommended texlive-bibtex-extra biber zip unzip

      - name: Clean manuscript source
        run: python3 scripts/jfei_pre_submission_cleanup.py

      - name: Verify manuscript values
        run: python3 scripts/verify_table_values.py

      - name: Compile manuscript for validation
        working-directory: manuscript
        run: latexmk -pdf -interaction=nonstopmode -halt-on-error NLS-79.tex

      - name: Package root-level LaTeX source for Springer intake
        run: |
          rm -rf output
          mkdir -p output/JFEI-blinded-review-package
          cp manuscript/NLS-79.tex output/JFEI-blinded-review-package/manuscript.tex
          cp manuscript/references.bib output/JFEI-blinded-review-package/references.bib
          file_count=$(find output/JFEI-blinded-review-package -type f | wc -l)
          test "$file_count" -eq 2
          test -f output/JFEI-blinded-review-package/manuscript.tex
          test -f output/JFEI-blinded-review-package/references.bib
          grep -q '\\documentclass' output/JFEI-blinded-review-package/manuscript.tex
          cd output/JFEI-blinded-review-package
          zip -r ../JFEI-blinded-review-package.zip manuscript.tex references.bib
          cd ..
          zipinfo -1 JFEI-blinded-review-package.zip
          zipinfo -1 JFEI-blinded-review-package.zip | grep -x "manuscript.tex"
          zipinfo -1 JFEI-blinded-review-package.zip | grep -x "references.bib"
          test "$(zipinfo -1 JFEI-blinded-review-package.zip | wc -l)" -eq 2

      - name: Upload editor source package
        uses: actions/upload-artifact@v4
        with:
          name: JFEI-blinded-review-package
          path: output/JFEI-blinded-review-package.zip
          if-no-files-found: error

# Springer intake package contract: root-level manuscript.tex and references.bib only.
