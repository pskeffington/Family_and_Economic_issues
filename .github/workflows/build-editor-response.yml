name: Build Editor Return Package

on:
  push:
    branches: [main]
    paths:
      - "manuscript/NLS-79.tex"
      - "manuscript/references.bib"
      - "tables/**"
      - "submission/editor-response-technical-check.tex"
      - "submission/funding-statement.tex"
      - "scripts/jfei_pre_submission_cleanup.py"
      - "scripts/verify_table_values.py"
      - ".github/workflows/build-editor-response.yml"
  pull_request:
    branches: [main]
    paths:
      - "manuscript/NLS-79.tex"
      - "manuscript/references.bib"
      - "tables/**"
      - "submission/editor-response-technical-check.tex"
      - "submission/funding-statement.tex"
      - "scripts/jfei_pre_submission_cleanup.py"
      - "scripts/verify_table_values.py"
      - ".github/workflows/build-editor-response.yml"
  workflow_dispatch:

jobs:
  build-editor-return-package:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install build and packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            latexmk \
            texlive-latex-base \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-bibtex-extra \
            biber \
            libimage-exiftool-perl \
            zip \
            unzip

      - name: Apply manuscript cleanup requested by technical check
        run: |
          python3 scripts/jfei_pre_submission_cleanup.py

      - name: Verify manuscript values and blinding
        run: |
          python3 scripts/verify_table_values.py

      - name: Build blinded manuscript PDF for local validation only
        working-directory: manuscript
        run: |
          latexmk -pdf -interaction=nonstopmode -halt-on-error NLS-79.tex

      - name: Build formatted response letter PDF
        working-directory: submission
        run: |
          latexmk -pdf -interaction=nonstopmode -halt-on-error editor-response-technical-check.tex

      - name: Prepare LaTeX-only manuscript ZIP and separate PDFs
        run: |
          set -euo pipefail

          SOURCE_DIR="output/JFEI-blinded-review-package"
          PDF_DIR="output/JFEI-manuscript-pdf"
          LETTER_DIR="output/JFEI-response-letter"
          ZIP_PATH="output/JFEI-blinded-review-package.zip"

          rm -rf output
          mkdir -p "$SOURCE_DIR" "$PDF_DIR" "$LETTER_DIR"

          cp manuscript/NLS-79.tex "$SOURCE_DIR/NLS-79.tex"
          cp manuscript/references.bib "$SOURCE_DIR/references.bib"
          cp submission/funding-statement.tex "$SOURCE_DIR/Funding-Statement.tex"
          cp manuscript/NLS-79.pdf "$PDF_DIR/NLS-79.pdf"
          cp submission/editor-response-technical-check.pdf "$LETTER_DIR/Response-to-Technical-Check.pdf"

          exiftool -all:all= -overwrite_original "$PDF_DIR/NLS-79.pdf"
          exiftool -all:all= -overwrite_original "$LETTER_DIR/Response-to-Technical-Check.pdf"

          # The blinded manuscript source must contain no declaration or author-identifying material.
          if grep -n -E "Paul A\. Skeffington|Paul Skeffington|Skeffington|Dartmouth|Statements and Declarations|Author Contributions|Acknowledgements|Competing Interests|Ethics Approval|Consent to Participate|Consent for Publication|Funding" "$SOURCE_DIR/NLS-79.tex"; then
            echo "Editor return package failed: declaration or identifying material found in blinded manuscript source."
            exit 1
          fi

          if ! grep -q "No funding was received to assist with the preparation of this manuscript" "$SOURCE_DIR/Funding-Statement.tex"; then
            echo "Editor return package failed: funding statement is missing expected text."
            exit 1
          fi

          test -s "$SOURCE_DIR/NLS-79.tex"
          test -s "$SOURCE_DIR/references.bib"
          test -s "$SOURCE_DIR/Funding-Statement.tex"
          test -s "$PDF_DIR/NLS-79.pdf"
          test -s "$LETTER_DIR/Response-to-Technical-Check.pdf"

          # Upload this ZIP as the LaTeX manuscript file. Keep files at ZIP root for Springer conversion.
          (cd "$SOURCE_DIR" && zip -r ../JFEI-blinded-review-package.zip NLS-79.tex references.bib Funding-Statement.tex)

          test -s "$ZIP_PATH"
          zipinfo -1 "$ZIP_PATH"
          zipinfo -1 "$ZIP_PATH" | grep -x "NLS-79.tex"
          zipinfo -1 "$ZIP_PATH" | grep -x "references.bib"
          zipinfo -1 "$ZIP_PATH" | grep -x "Funding-Statement.tex"
          if zipinfo -1 "$ZIP_PATH" | grep -q -E "\.pdf$|/"; then
            echo "Editor return package failed: LaTeX source ZIP must not contain PDFs or nested folders."
            exit 1
          fi

      - name: Upload LaTeX-only manuscript ZIP
        uses: actions/upload-artifact@v4
        with:
          name: JFEI-blinded-review-package
          path: output/JFEI-blinded-review-package.zip
          if-no-files-found: error

      - name: Upload manuscript PDF separately
        uses: actions/upload-artifact@v4
        with:
          name: JFEI-manuscript-pdf
          path: output/JFEI-manuscript-pdf/NLS-79.pdf
          if-no-files-found: error

      - name: Upload response letter PDF separately
        uses: actions/upload-artifact@v4
        with:
          name: JFEI-response-letter
          path: output/JFEI-response-letter/Response-to-Technical-Check.pdf
          if-no-files-found: error
