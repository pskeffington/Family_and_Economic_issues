name: Build Editor Return Package

on:
  push:
    branches: [main]
    paths:
      - "manuscript/NLS-79.tex"
      - "manuscript/references.bib"
      - "tables/**"
      - "submission/editor-response-technical-check.tex"
      - "submission/funding-statement.tex"
      - "scripts/jfei_pre_submission_cleanup.py"
      - "scripts/verify_table_values.py"
      - ".github/workflows/build-editor-response.yml"
  pull_request:
    branches: [main]
    paths:
      - "manuscript/NLS-79.tex"
      - "manuscript/references.bib"
      - "tables/**"
      - "submission/editor-response-technical-check.tex"
      - "submission/funding-statement.tex"
      - "scripts/jfei_pre_submission_cleanup.py"
      - "scripts/verify_table_values.py"
      - ".github/workflows/build-editor-response.yml"
  workflow_dispatch:

jobs:
  build-editor-return-package:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install build and packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            latexmk \
            texlive-latex-base \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-bibtex-extra \
            biber \
            libimage-exiftool-perl \
            zip \
            unzip

      - name: Apply manuscript cleanup requested by technical check
        run: |
          python3 scripts/jfei_pre_submission_cleanup.py

      - name: Verify manuscript values and blinding
        run: |
          python3 scripts/verify_table_values.py

      - name: Build revised blinded manuscript PDF
        working-directory: manuscript
        run: |
          latexmk -pdf -interaction=nonstopmode -halt-on-error NLS-79.tex

      - name: Build formatted response letter PDF
        working-directory: submission
        run: |
          latexmk -pdf -interaction=nonstopmode -halt-on-error editor-response-technical-check.tex

      - name: Build separate funding statement PDF
        working-directory: submission
        run: |
          latexmk -pdf -interaction=nonstopmode -halt-on-error funding-statement.tex

      - name: Prepare single editor-ready return ZIP
        run: |
          set -euo pipefail

          PACKAGE_DIR="output/JFEI-technical-check-return-package"
          ZIP_PATH="output/JFEI-technical-check-return-package.zip"

          rm -rf output
          mkdir -p "$PACKAGE_DIR"

          cp manuscript/NLS-79.pdf "$PACKAGE_DIR/Revised-Blinded-Manuscript.pdf"
          cp manuscript/NLS-79.tex "$PACKAGE_DIR/Revised-Blinded-Manuscript.tex"
          cp manuscript/references.bib "$PACKAGE_DIR/references.bib"
          cp submission/editor-response-technical-check.pdf "$PACKAGE_DIR/Response-to-Technical-Check.pdf"
          cp submission/funding-statement.pdf "$PACKAGE_DIR/Funding-Statement-Separate-Page.pdf"

          exiftool -all:all= -overwrite_original "$PACKAGE_DIR/Revised-Blinded-Manuscript.pdf"
          exiftool -all:all= -overwrite_original "$PACKAGE_DIR/Response-to-Technical-Check.pdf"
          exiftool -all:all= -overwrite_original "$PACKAGE_DIR/Funding-Statement-Separate-Page.pdf"

          # The revised blinded manuscript itself must contain no declaration or author-identifying material.
          if grep -n -E "Paul A\. Skeffington|Paul Skeffington|Skeffington|Dartmouth|Statements and Declarations|Author Contributions|Acknowledgements|Competing Interests|Ethics Approval|Consent to Participate|Consent for Publication|Funding" "$PACKAGE_DIR/Revised-Blinded-Manuscript.tex"; then
            echo "Editor return package failed: declaration or identifying material found in revised blinded manuscript."
            exit 1
          fi

          # The separate funding page is the only location where funding text is allowed.
          if ! grep -q "No funding was received to assist with the preparation of this manuscript" submission/funding-statement.tex; then
            echo "Editor return package failed: separate funding statement is missing expected text."
            exit 1
          fi

          test -s "$PACKAGE_DIR/Revised-Blinded-Manuscript.pdf"
          test -s "$PACKAGE_DIR/Revised-Blinded-Manuscript.tex"
          test -s "$PACKAGE_DIR/references.bib"
          test -s "$PACKAGE_DIR/Response-to-Technical-Check.pdf"
          test -s "$PACKAGE_DIR/Funding-Statement-Separate-Page.pdf"

          (cd output && zip -r "JFEI-technical-check-return-package.zip" "JFEI-technical-check-return-package")

          test -s "$ZIP_PATH"
          unzip -l "$ZIP_PATH"
          unzip -l "$ZIP_PATH" | grep "JFEI-technical-check-return-package/Revised-Blinded-Manuscript.pdf"
          unzip -l "$ZIP_PATH" | grep "JFEI-technical-check-return-package/Revised-Blinded-Manuscript.tex"
          unzip -l "$ZIP_PATH" | grep "JFEI-technical-check-return-package/references.bib"
          unzip -l "$ZIP_PATH" | grep "JFEI-technical-check-return-package/Response-to-Technical-Check.pdf"
          unzip -l "$ZIP_PATH" | grep "JFEI-technical-check-return-package/Funding-Statement-Separate-Page.pdf"

      - name: Upload single editor-ready return package
        uses: actions/upload-artifact@v4
        with:
          name: JFEI-technical-check-return-package
          path: output/JFEI-technical-check-return-package.zip
          if-no-files-found: error
